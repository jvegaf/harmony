name: Build/release

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build

      # AIDEV-NOTE: Replaced imyanice/action-electron-builder@v1.7.0 which has zero pnpm support
      # (it checks for package-lock.json to decide npm vs yarn). Manual steps give us full control.
      - name: Package & Release (electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: >-
          pnpm exec electron-builder
          --config electron-builder.yml
          ${{ startsWith(github.ref, 'refs/tags/v') && '--publish always' || '--publish never' }}
